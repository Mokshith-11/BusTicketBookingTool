name: Deploy Angular frontend to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: BusTicketBookingTool-Frontend/package-lock.json

      - name: Install dependencies
        working-directory: BusTicketBookingTool-Frontend
        run: npm ci

      - name: Build frontend
        working-directory: BusTicketBookingTool-Frontend
        run: npm run build -- --base-href /BusTicketBookingTool/

      - name: Add SPA fallback
        run: cp BusTicketBookingTool-Frontend/dist/buss-frontend/browser/index.html BusTicketBookingTool-Frontend/dist/buss-frontend/browser/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: BusTicketBookingTool-Frontend/dist/buss-frontend/browser

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
