<div class="min-h-screen bg-gray-100 flex flex-col items-center py-12 p-4">

  <div class="w-full max-w-md bg-white shadow-xl rounded-2xl border border-gray-200">
    
    <!-- Top Header -->
    <div class="bg-gray-800 text-white p-6 flex items-center justify-between rounded-t-2xl">
      <div class="flex items-center space-x-4">
        <a routerLink="/vignesh/booking-endpoints" class="p-2 bg-gray-700 hover:bg-gray-600 rounded-full transition cursor-pointer">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        </a>
        <h2 class="text-2xl font-bold tracking-wide">Booking / POST</h2>
      </div>
    </div>

    <!-- Booking Form -->
    <div class="p-8">
      <h3 class="text-xl font-bold text-gray-800 mb-6 text-center">Book Seat</h3>

      <div *ngIf="successMessage" class="bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg text-sm mb-6 flex justify-between items-center group">
        <span>✅ {{ successMessage }}</span>
        <a routerLink="/vignesh/booking-endpoints" class="text-xs text-green-800 underline cursor-pointer">Back</a>
      </div>

      <div *ngIf="errorMessage" class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm mb-6">
        ❌ {{ errorMessage }}
      </div>

      <form [formGroup]="bookingForm" (ngSubmit)="onSubmit()" class="space-y-5">
        
        <!-- Trip ID Input -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">tripId:</label>
          <input type="number" formControlName="tripId" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none" />
        </div>

        <!-- Customer ID Input -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">customerId:</label>
          <input type="number" formControlName="customerId" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none" />
        </div>

         <!-- Seat Number Input (Implied required for backend) -->
         <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">seatNumber:</label>
          <input type="number" formControlName="seatNumber" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none" />
        </div>
        
        <button [disabled]="bookingForm.invalid || isLoading" type="submit" class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-400 text-white font-bold py-3 px-4 rounded-xl shadow transition-colors mt-6 uppercase tracking-wider relative">
          <span *ngIf="!isLoading">POST</span>
          <span *ngIf="isLoading" class="animate-pulse">Processing...</span>
        </button>
      </form>
      
    </div>
  </div>

</div>
