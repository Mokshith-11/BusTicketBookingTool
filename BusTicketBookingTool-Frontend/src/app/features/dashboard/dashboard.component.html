<div class="min-h-screen bg-gray-100">
  
  <!-- Navbar -->
  <nav class="bg-gray-800 text-white px-6 py-4 flex items-center shadow-md">
    <h1 class="text-lg font-bold tracking-wide">Bus Ticket Booking System</h1>
    <span class="ml-auto flex items-center gap-4">
      <span class="text-gray-300">Welcome, <strong class="text-white capitalize">{{ auth.username() }}</strong></span>
      <button (click)="logout()" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded text-sm font-bold transition-colors">
        Sign Out
      </button>
    </span>
  </nav>

  <!-- Module Cards Grid -->
  <div class="max-w-7xl mx-auto p-8">
    <h2 class="text-2xl font-bold text-gray-800 mb-6">Your Authorized Modules</h2>
    
    <div *ngIf="visibleModules.length === 0" class="text-gray-500 italic">
      No modules assigned.
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
      
      <div 
        *ngFor="let mod of visibleModules"
        (click)="navigateTo(mod.route)"
        class="bg-white rounded-lg shadow-md p-6 cursor-pointer transition-all duration-200 hover:-translate-y-1 hover:shadow-lg border-l-4 border-green-500">
        
        <h3 class="text-lg font-bold mb-1 text-green-700">
          {{ mod.name }}
        </h3>
        <p class="text-sm text-gray-500 mb-3 capitalize">Owner: {{ mod.owner }}</p>
        
        <div class="flex justify-between items-center">
          <span class="text-xs text-gray-500">{{ mod.endpoints }} Endpoints</span>
        </div>
      </div>

    </div>
  </div>
</div>
