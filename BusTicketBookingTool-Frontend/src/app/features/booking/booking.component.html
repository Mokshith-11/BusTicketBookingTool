<div class="min-h-screen bg-gray-100">
  <nav class="bg-gray-800 text-white px-6 py-4 flex items-center shadow-md">
    <button (click)="back()" class="mr-4 hover:text-blue-300 transition">← Back</button>
    <h1 class="text-lg font-bold">Booking Management</h1>
    <span class="ml-auto text-xs text-gray-400">★ Vignesh's Module</span>
  </nav>

  <div class="max-w-6xl mx-auto p-8 grid grid-cols-1 md:grid-cols-3 gap-6">
    <!-- Book Form -->
    <div class="bg-white rounded-lg shadow-md p-6 border-l-4 border-green-500">
      <h3 class="text-lg font-bold text-gray-800 mb-4">Create Booking</h3>
      <form [formGroup]="bookForm" (ngSubmit)="onBook()" class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-gray-600 mb-1">Trip ID</label>
          <input formControlName="tripId" type="number" class="w-full px-3 py-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-600 mb-1">Seat Number</label>
          <input formControlName="seatNumber" type="text" class="w-full px-3 py-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-600 mb-1">Passenger Name</label>
          <input formControlName="passengerName" type="text" class="w-full px-3 py-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <button [disabled]="bookForm.invalid" type="submit" class="w-full bg-green-600 hover:bg-green-700 disabled:bg-gray-400 text-white font-bold py-2 rounded transition">
          Book Seat
        </button>
      </form>
    </div>

    <!-- Bookings Table -->
    <div class="md:col-span-2 bg-white rounded-lg shadow-md p-6">
      <h3 class="text-lg font-bold text-gray-800 mb-4">My Bookings</h3>
      <div *ngIf="bookings().length === 0" class="text-center text-gray-400 py-8 border-2 border-dashed rounded">
        No bookings found. Create one to get started.
      </div>
      <table *ngIf="bookings().length > 0" class="w-full text-sm">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-4 py-3 text-left font-semibold text-gray-600">ID</th>
            <th class="px-4 py-3 text-left font-semibold text-gray-600">Trip</th>
            <th class="px-4 py-3 text-left font-semibold text-gray-600">Seat</th>
            <th class="px-4 py-3 text-left font-semibold text-gray-600">Status</th>
            <th class="px-4 py-3 text-left font-semibold text-gray-600">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let b of bookings()" class="border-t hover:bg-gray-50">
            <td class="px-4 py-3">{{ b.id }}</td>
            <td class="px-4 py-3">{{ b.tripId }}</td>
            <td class="px-4 py-3">{{ b.seatNumber }}</td>
            <td class="px-4 py-3">
              <span class="px-2 py-1 rounded-full text-xs font-bold"
                [ngClass]="{'bg-green-100 text-green-700': b.status === 'CONFIRMED', 'bg-red-100 text-red-700': b.status === 'CANCELLED'}">
                {{ b.status }}
              </span>
            </td>
            <td class="px-4 py-3">
              <button (click)="onCancel(b.id)" class="text-red-500 hover:text-red-700 font-semibold text-xs">Cancel</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
