<div class="min-h-screen bg-gray-100">
  <nav class="bg-gray-800 text-white px-6 py-4 flex items-center shadow-md">
    <button (click)="back()" class="mr-4 hover:text-blue-300 transition">← Back</button>
    <h1 class="text-lg font-bold">Payment Gateway</h1>
    <span class="ml-auto text-xs text-gray-400">★ Vignesh's Module</span>
  </nav>

  <div class="max-w-6xl mx-auto p-8 grid grid-cols-1 md:grid-cols-3 gap-6">
    <!-- Payment Form -->
    <div class="bg-white rounded-lg shadow-md p-6 border-l-4 border-green-500">
      <h3 class="text-lg font-bold text-gray-800 mb-4">Process Payment</h3>
      <form [formGroup]="payForm" (ngSubmit)="onPay()" class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-gray-600 mb-1">Amount</label>
          <input formControlName="amount" type="number" step="0.01" class="w-full px-3 py-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-600 mb-1">Method</label>
          <input formControlName="method" type="text" placeholder="CARD, CASH, UPI" class="w-full px-3 py-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <button [disabled]="payForm.invalid" type="submit" class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-400 text-white font-bold py-2 rounded transition">
          Submit Payment
        </button>
      </form>
    </div>

    <!-- Payments Table -->
    <div class="md:col-span-2 bg-white rounded-lg shadow-md p-6">
      <h3 class="text-lg font-bold text-gray-800 mb-4">Payment History</h3>
      @if (payments().length === 0) {
        <div class="text-center text-gray-400 py-8 border-2 border-dashed rounded">
          No payment history found.
        </div>
      }
      @if (payments().length > 0) {
        <table class="w-full text-sm">
          <thead class="bg-gray-50">
            <tr>
              <th class="px-4 py-3 text-left font-semibold text-gray-600">ID</th>
              <th class="px-4 py-3 text-left font-semibold text-gray-600">Amount</th>
              <th class="px-4 py-3 text-left font-semibold text-gray-600">Method</th>
              <th class="px-4 py-3 text-left font-semibold text-gray-600">Status</th>
            </tr>
          </thead>
          <tbody>
            @for (p of payments(); track p.id) {
              <tr class="border-t hover:bg-gray-50">
                <td class="px-4 py-3">{{ p.id }}</td>
                <td class="px-4 py-3">₹{{ p.amount }}</td>
                <td class="px-4 py-3">{{ p.method }}</td>
                <td class="px-4 py-3">
                  <span class="px-2 py-1 rounded-full text-xs font-bold"
                    [ngClass]="{'bg-green-100 text-green-700': p.status === 'PAID', 'bg-yellow-100 text-yellow-700': p.status === 'PENDING'}">
                    {{ p.status }}
                  </span>
                </td>
              </tr>
            }
          </tbody>
        </table>
      }
    </div>
  </div>
</div>
