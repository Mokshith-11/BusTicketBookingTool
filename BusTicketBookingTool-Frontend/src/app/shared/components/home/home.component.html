<div class="h-screen bg-[hsl(var(--bg-reference))] flex overflow-hidden">
  
  <!-- Lumina Dark Sidebar (High Contrast Split) -->
  <aside class="w-80 bg-[hsl(var(--sidebar-dark))] flex flex-col p-8 z-20">
    <div class="mb-12">
      <div class="w-10 h-10 rounded-xl bg-[hsl(var(--accent-primary))] flex items-center justify-center shadow-2xl shadow-blue-900/20 mb-4">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 21v-2a1 1 0 00-1-1H8a1 1 0 00-1 1v2m10-4H7a2 2 0 01-2-2V5a2 2 0 012-2h10a2 2 0 012 2v10a2 2 0 01-2 2zM7 13h10M9 17h.01M15 17h.01" />
        </svg>
      </div>
      <h2 class="text-xl font-black tracking-tighter text-white leading-tight">BusTicketBookingTool</h2>
      <span class="text-xs font-black text-[#DBE2EF] uppercase tracking-widest leading-none mt-1">Management System</span>
    </div>

    <div class="flex-1 space-y-3 overflow-y-auto scroll-custom pr-2">
      @for (member of team; track member.key) {
        <button 
          (click)="selectMember(member)"
          class="w-full text-left p-5 rounded-2xl transition-all duration-300 flex flex-col group"
          [ngClass]="{
            'bg-white text-slate-900 shadow-2xl': selectedMember()?.key === member.key,
            'text-slate-400 hover:text-slate-100 hover:bg-white/5': selectedMember()?.key !== member.key
          }">
          <span class="text-lg font-black tracking-tight">{{ member.name }}</span>
          @if (selectedMember()?.key === member.key) {
             <div class="mt-3 pt-3 border-t border-slate-100 flex flex-col gap-1">
                <span class="text-[9px] font-black uppercase tracking-widest text-slate-400">Modules</span>
                <span class="text-xs font-bold text-[#3F72AF]">{{ member.modules }}</span>
             </div>
          }
        </button>
      }
    </div>

    <div class="mt-8 pt-6 border-t border-white/5 flex flex-col gap-1">
        <span class="text-[9px] font-black text-slate-500 uppercase tracking-widest">&copy; BusTicketBookingTool</span>
    </div>
  </aside>

  <!-- Main Pure Interface -->
  <main class="flex-1 flex flex-col items-center justify-center p-10 relative">
    
    <div class="w-full max-w-lg mb-10 text-center">
       <span class="text-2xl font-bold text-[#3F72AF] uppercase tracking-[0.2em]">Authentication Terminal</span>
    </div>

    <div class="w-full max-w-lg">
      <div class="glass-card p-12 md:p-14 rounded-[3.5rem] bg-white border-none shadow-2xl shadow-slate-200">
        
        @if (!selectedMember()) {
          <div class="py-16 flex flex-col items-center justify-center text-center opacity-40">
             <div class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mb-8">
                <svg class="w-8 h-8 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
             </div>
             <p class="text-sm font-black uppercase tracking-widest text-slate-400">Initialize Identity</p>
          </div>
        }

        @if (selectedMember()) {
          <div class="space-y-10 animate-slide-up">
            
            <div class="flex items-center gap-5 p-5 bg-slate-50 rounded-[1.5rem]">
               <div class="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center text-white font-black text-lg">
                  {{ selectedMember()!.name[0] }}
               </div>
               <div class="flex flex-col">
                  <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Selected Identity</span>
                  <span class="text-lg font-black text-slate-900 leading-tight">{{ selectedMember()!.name }}</span>
               </div>
            </div>

            <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="space-y-8">
              <div class="space-y-6">
                <div class="space-y-2">
                  <label class="label-purple ml-1">
                    <div class="dot-purple"></div>
                    Identifier
                  </label>
                  <input type="text" formControlName="username" class="input-field opacity-60">
                </div>

                <div class="space-y-2">
                  <label class="label-purple ml-1">
                    <div class="dot-purple"></div>
                    Security Key
                  </label>
                  <input type="password" formControlName="password" placeholder="••••" class="input-field">
                </div>
              </div>

              <button type="submit" [disabled]="loginForm.invalid" class="btn-primary w-full py-6 text-sm">
                Confirm Identity
              </button>
            </form>
          </div>
        }

      </div>
    </div>
  </main>

</div>
