<div class="min-h-screen bg-[hsl(var(--bg-reference))] text-slate-900 selection:bg-blue-500/10 selection:text-blue-600">
  
  <div class="max-w-7xl mx-auto px-8 py-8">
    
    <!-- Minimal Lumina Navbar -->
    <nav class="flex items-center justify-between mb-16">
      <div class="flex items-center gap-4 group cursor-pointer" (click)="router.navigate(['/'])">
        <div class="w-12 h-12 rounded-xl bg-[#3F72AF] flex items-center justify-center shadow-xl shadow-blue-900/20 group-hover:scale-105 transition-all">
          <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 21v-2a1 1 0 00-1-1H8a1 1 0 00-1 1v2m10-4H7a2 2 0 01-2-2V5a2 2 0 012-2h10a2 2 0 012 2v10a2 2 0 01-2 2zM7 13h10M9 17h.01M15 17h.01" />
          </svg>
        </div>
        <div class="flex flex-col">
          <span class="text-2xl font-black tracking-tighter text-slate-900 leading-tight">BusTicketBookingTool</span>
          <span class="text-xs font-black text-[#3F72AF] uppercase tracking-widest leading-none mt-1.5">Management Console</span>
        </div>
      </div>

      <div class="flex items-center gap-8">
        <div class="hidden sm:flex flex-col items-end">
          <span class="text-xs text-slate-400 font-extrabold uppercase tracking-widest leading-none">Active</span>
          <span class="text-xl font-black text-slate-800 capitalize leading-none mt-1">{{ auth.username() }}</span>
        </div>
        <button (click)="logout()" class="py-4 px-8 text-base bg-white border border-slate-200 text-slate-500 hover:text-rose-500 hover:bg-rose-50 hover:border-rose-200 font-black rounded-xl transition-all">
          Sign Out
        </button>
      </div>
    </nav>

    <!-- Module Grid (Clean Interface) -->
    <div class="flex flex-wrap justify-center gap-8 pb-20">
      @for (mod of visibleModules; track mod.route) {
        <div 
          (click)="navigateTo(mod.route)"
          class="glass-card group p-10 rounded-[3rem] cursor-pointer bg-white/40 border-slate-200/40 hover:-translate-y-1 transition-all w-full max-w-[24rem] md:basis-[24rem]"
        >
          <div class="flex justify-between items-start mb-10">
            <div class="w-14 h-14 rounded-2xl bg-white border border-slate-100 flex items-center justify-center text-slate-400 group-hover:bg-blue-600 group-hover:text-white group-hover:border-blue-600 transition-all shadow-sm">
              <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
              </svg>
            </div>
          </div>
          
          <h3 class="text-4xl font-black mb-4 tracking-tighter text-slate-900 group-hover:text-[#3F72AF] transition-colors leading-none">
            {{ mod.name }}
          </h3>
          <p class="text-base text-slate-500 leading-relaxed min-h-[4rem] font-medium">
            {{ mod.description }}
          </p>
          
          <div class="mt-10 pt-8 border-t border-slate-100/50 flex items-center justify-between">
            <span class="text-lg font-black text-slate-900">{{ mod.endpoints }} API Gateways</span>
            <div class="w-12 h-12 rounded-full flex items-center justify-center bg-slate-50 group-hover:bg-blue-50 transition-all">
              <svg class="w-6 h-6 text-[hsl(var(--accent-primary))] transition-transform group-hover:translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3" />
              </svg>
            </div>
          </div>
        </div>
      }
    </div>
  </div>

  <footer class="max-w-7xl mx-auto px-8 py-10 border-t border-slate-100 text-center flex flex-col gap-2">
       <span class="text-[10px] font-black uppercase tracking-[0.4em] text-slate-300">BusTicketBookingTool</span>
  </footer>
</div>
