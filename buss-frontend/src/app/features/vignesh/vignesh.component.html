<div class="min-h-screen bg-gray-100 flex flex-col items-center py-12 p-4">

  <div class="w-full max-w-2xl bg-white shadow-xl rounded-2xl overflow-hidden border border-gray-200">
    
    <!-- Top Header -->
    <div class="bg-blue-600 text-white p-6 flex justify-between items-center">
      <h2 class="text-2xl font-bold tracking-wide">1. {{ userName }} Dashboard</h2>
      <button (click)="logout()" class="text-blue-100 hover:text-white px-3 py-1 border border-blue-400 hover:border-white rounded-md text-sm transition">
        Logout
      </button>
    </div>

    <!-- Interface Box -->
    <div class="p-10 flex flex-col items-center justify-center space-y-6">
      
      <p class="text-gray-500 mb-4">Select an area to manage:</p>

      <!-- Booking Link -->
      <a routerLink="/vignesh/booking-endpoints" class="group w-64 bg-white border-2 border-blue-500 rounded-xl p-4 flex items-center justify-between cursor-pointer hover:bg-blue-50 transition transform hover:-translate-y-1 hover:shadow-md">
        <span class="font-bold text-blue-700 text-lg">Booking</span>
        <svg class="w-6 h-6 text-blue-500 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
      </a>

      <!-- Payment Link -->
      <a class="group w-64 bg-white border-2 border-blue-500 rounded-xl p-4 flex items-center justify-between cursor-pointer hover:bg-blue-50 transition transform hover:-translate-y-1 hover:shadow-md">
        <span class="font-bold text-blue-700 text-lg">Payment</span>
        <svg class="w-6 h-6 text-blue-500 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
      </a>

    </div>
  </div>

</div>
