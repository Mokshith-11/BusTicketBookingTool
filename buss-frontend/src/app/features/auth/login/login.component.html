<div class="min-h-screen bg-gray-50 flex items-center justify-center p-4">
  
  <div class="w-full max-w-md bg-white border border-gray-200 shadow-xl rounded-2xl p-8 relative">
    
    <a routerLink="/home" class="absolute top-6 left-6 text-gray-400 hover:text-gray-600 cursor-pointer">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
    </a>

    <!-- User Initial Icon -->
    <div class="bg-indigo-600 rounded-full h-20 w-20 flex items-center justify-center mx-auto mb-6 shadow-lg shadow-indigo-200 text-white text-3xl font-black">
      {{ requestedUser ? requestedUser.charAt(0).toUpperCase() : '?' }}
    </div>

    <h3 class="text-2xl font-bold text-center text-gray-800 mb-2 capitalize">{{ requestedUser }} Login</h3>
    <p class="text-gray-500 text-center mb-8 text-sm">Please authenticate to access your tools.</p>

    <div *ngIf="loginError" class="bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-lg text-sm mb-6">
      Invalid password for {{ requestedUser }}.
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="space-y-6">
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Username</label>
        <div class="w-full px-4 py-3 rounded-lg bg-gray-100 border border-gray-200 text-gray-600 capitalize cursor-not-allowed">
          {{ requestedUser }}
        </div>
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
        <input type="password" formControlName="password" placeholder="Any password works for demo" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 outline-none transition-all" />
      </div>
      
      <button [disabled]="loginForm.invalid" type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-xl shadow-md transition-colors mt-2 tracking-wide uppercase text-sm disabled:opacity-50 disabled:cursor-not-allowed">
        Enter Dashboard
      </button>
    </form>
    
  </div>
</div>
